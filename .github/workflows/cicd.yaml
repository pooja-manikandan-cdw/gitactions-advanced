name: cicd pipeline
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: build application
        run: npm run build
      
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-app-build
          path: ./dist